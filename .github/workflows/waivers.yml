# RETIRED AT CUTOVER: waiver processing moves to a scheduled Cloud Function
# (functions/) once the authenticated v2 schema goes live. This workflow is kept
# only as a fallback and no-ops unless the repo variable LEGACY_WAIVERS is set
# to 'true' (Settings -> Secrets and variables -> Actions -> Variables).
name: Process waivers

on:
  schedule:
    - cron: '2 10 * * 2,5'   # Tue & Fri 10:02 UTC — the league's processing time
  workflow_dispatch:

concurrency:
  group: waiver-run
  cancel-in-progress: false

jobs:
  waivers:
    if: vars.LEGACY_WAIVERS == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run waivers through the live app
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: node scripts/run_waivers.js
